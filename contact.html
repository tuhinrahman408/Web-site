<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • Tuhin Rahman Asif</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner container">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>Tuhin Rahman Asif • Personal Site</div>
      </div>
      <button class="menu-btn" aria-label="Toggle menu">Menu</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1>Contact</h1>
      <p>Fill out the form below to get in touch.</p>
    </div>

    <section class="section card">
      <form id="contact-form">
        <div class="form-row">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" />
          </div>
        </div>
        <div style="margin-top:12px;">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write your message..."></textarea>
        </div>
        <div class="form-actions">
          <button class="cta" type="submit">Send</button>
          <button class="btn" type="reset">Reset</button>
        </div>
      </form>
      <p class="muted" style="margin-top:10px;">Note: This is a demo—no backend. Later, if desired, email service/server will be added.</p>
    </section>
  </main>

  <footer>
    © 2026 Asif • Built with HTML, CSS, and JavaScript
  </footer>

  <script src="script.js"></script>
</body>
</html>
